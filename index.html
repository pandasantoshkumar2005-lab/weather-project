<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Weather App</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">
    <h1 class="text-center mt-4 mb-4 fw-bold weather-heading">Weather App</h1>
    <div class="input-group mb-4">
        <input type="text" class="form-control city-input" id="cityInput" placeholder="Enter city name">
        <button class="btn btn-primary search-btn" id="searchBtn">Search</button>
    </div>


    <div class="card mt-4 shadow weather-card">
        <div class="card-body text-center">
            <h2 class="weather-icon">🌤️</h2>
            <h3 id="cityName" class="city-name">City Name</h3>
            <h1 id="temperature" class="temperature">28°C</h1>
            <p id="weather" class="weather-description">Clear Sky</p>
            <hr>

            <div class="row weather-details">
                <div class="col">
                    <h6>Humidity</h6>
                    <p id="humidity">75%</p>
                </div>
                <div class="col">
                    <h6>Wind</h6>
                    <p id="wind">8 km/h</p>
                </div>
                <div class="col">
                    <h6>Pressure</h6>
                    <p id="pressure">1012 hPa</p>
                </div>
            </div>
        </div>
    </div>

    <h2 class="text-center mt-5 mb-3 forecast-heading">5-Day Forecast</h2>

    <div class="row g-3">
        <div class="col-md col-6">
            <div class="card text-center shadow forecast-card">
                <div class="card-body">
                    <h5 class="forecast-day">Mon</h5>
                    <h2 class="forecast-icon">☀️</h2>
                    <p class="forecast-temp">30°C</p>
                </div>
            </div>
        </div>

        <div class="col-md col-6">
            <div class="card text-center shadow forecast-card">
                <div class="card-body">
                    <h5 class="forecast-day">Tue</h5>
                    <h2 class="forecast-icon">🌤️</h2>
                    <p class="forecast-temp">29°C</p>
                </div>
            </div>
        </div>

        <div class="col-md col-6">
            <div class="card text-center shadow forecast-card">
                <div class="card-body">
                    <h5 class="forecast-day">Wed</h5>
                    <h2 class="forecast-icon">☁️</h2>
                    <p class="forecast-temp">27°C</p>
                </div>
            </div>
        </div>

        <div class="col-md col-6">
            <div class="card text-center shadow forecast-card">
                <div class="card-body">
                    <h5 class="forecast-day">Thu</h5>
                    <h2 class="forecast-icon">🌧️</h2>
                    <p class="forecast-temp">25°C</p>
                </div>
            </div>
        </div>

        <div class="col-md col-6">
            <div class="card text-center shadow forecast-card">
                <div class="card-body">
                    <h5 class="forecast-day">Fri</h5>
                    <h2 class="forecast-icon">⛈️</h2>
                    <p class="forecast-temp">26°C</p>
                </div>
            </div>
        </div>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
<script src="script.js"></script>

</body>
</html>
